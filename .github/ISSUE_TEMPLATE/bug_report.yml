name: Bug Report
description: Report a bug or unexpected behavior in HAL Builder
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I click the "Add Layer" button, the application freezes...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue
      placeholder: |
        1. Open HAL Builder
        2. Click "Add Layer"
        3. Select "Audio Visualizer"
        4. Application freezes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The audio visualizer layer should be added to the canvas
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The application froze and became unresponsive
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (Application crashes or data loss)
        - High (Major feature broken)
        - Medium (Feature partially broken)
        - Low (Minor issue or cosmetic)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this occur?
      options:
        - Always (100%)
        - Often (>50%)
        - Sometimes (20-50%)
        - Rarely (<20%)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your development/runtime environment
      value: |
        - **OS**: [e.g., Windows 11, macOS 14, Ubuntu 22.04]
        - **Browser**: [e.g., Chrome 120, Firefox 121, Safari 17]
        - **HAL Builder Version**: [e.g., 1.5.0]
        - **Node Version**: [e.g., 18.17.0]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: console-logs
    attributes:
      label: Console Logs / Error Messages
      description: Any relevant console output or error messages
      placeholder: Paste console logs here...
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
      placeholder: Drag and drop images here or paste image URLs

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: This only happens when using Chrome with hardware acceleration enabled...

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all required information above
          required: true
        - label: I can reproduce this issue consistently
          required: false
